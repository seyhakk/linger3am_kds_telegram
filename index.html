<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KDS - Kitchen Display System</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
  <body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <img src="logo.jpg" class="header-logo">
        <h1 class="logo">KDS</h1>
      </div>
      <div class="header-right">
        <div class="status-indicator">
          <span class="dot"></span>
          <span>Live</span>
        </div>
        <button id="refreshBtn" class="btn-icon" title="Refresh">↻</button>
      </div>
    </header>

    <nav class="status-tabs">
      <button class="status-tab active" data-status="new">
        <span class="tab-label">NEW</span>
        <span class="tab-count" id="count-new">0</span>
      </button>
      <button class="status-tab" data-status="preparing">
        <span class="tab-label">PREPARING</span>
        <span class="tab-count" id="count-preparing">0</span>
      </button>
      <button class="status-tab" data-status="completed">
        <span class="tab-label">COMPLETED</span>
        <span class="tab-count" id="count-completed">0</span>
      </button>
      <button class="clear-all-btn" onclick="clearCompleted()">CLEAR ALL</button>
    </nav>

    <main class="main-content">
      <div id="ordersContainer" class="orders-grid"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
